<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบเช็คชื่อ — ARTNOLATE</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ใช้โทนสีและดีไซน์ที่เน้นความสะอาดและทันสมัย */
    :root {
      --navy: #1C2951; --orange: #FF8C00; --white: #FFFFFF;
      --gray-50: #F7F8FB; --gray-100: #ECEEF5; --gray-200: #D5D9E8;
      --gray-600: #545D78; --gray-800: #2A3248; --green: #16A34A;
      --purple: #7C3AED; --font: 'Sarabun', sans-serif;
    }
    body { font-family: var(--font); background: var(--gray-50); color: var(--gray-800); margin: 0; padding-bottom: 50px; }
    
    /* Header */
    .app-header { background: var(--navy); padding: 20px; color: var(--white); text-align: center; }
    .app-header h1 { margin: 0; font-size: 20px; }
    .app-header p { margin: 5px 0 0; font-size: 12px; color: var(--orange); letter-spacing: 2px; text-transform: uppercase; }

    /* Tabs */
    .tabs { display: flex; justify-content: center; background: var(--white); border-bottom: 1px solid var(--gray-200); }
    .tab-btn { padding: 15px 25px; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--gray-600); border-bottom: 3px solid transparent; }
    .tab-btn.active { color: var(--navy); border-bottom-color: var(--orange); }

    /* Page Content */
    .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .form-control { padding: 8px; border: 1px solid var(--gray-200); border-radius: 6px; flex: 1; }

    /* Card */
    .card { background: var(--white); border: 1px solid var(--gray-100); border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    .card.done { opacity: 0.7; background: #f9f9f9; }
    .student-info h3 { margin: 0 0 5px; color: var(--navy); }
    .student-info p { margin: 0; font-size: 13px; color: var(--gray-600); }
    
    /* Buttons */
    .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; margin-left: 5px; }
    .btn-check { background: var(--navy); color: white; }
    .btn-done { background: var(--green); color: white; cursor: not-allowed; }
    
    /* Tables */
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--gray-100); }
    
    .loading { text-align: center; padding: 40px; }
  </style>
</head>
<body>

<header class="app-header">
  <h1>ระบบเช็คชื่อ ARTNOLATE</h1>
  <p>Admin Dashboard</p>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchPage('attendance')">✅ เช็คชื่อ</button>
  <button class="tab-btn" onclick="switchPage('report')">📋 รายงาน</button>
</nav>

<div class="container">
  <div id="page-attendance">
    <div class="toolbar">
      <input type="date" id="att-date" class="form-control" onchange="renderAttendance()">
      <select id="att-dept" class="form-control" onchange="renderAttendance()">
        <option value="">เลือกภาควิชา</option>
        <option>ศิลปกรรม</option><option>สถาปัตยกรรม</option><option>นิเทศศิลป์</option>
      </select>
    </div>
    <div id="att-list"></div>
  </div>

  <div id="page-report" style="display:none">
    <input type="date" id="rep-date" class="form-control" onchange="renderReport()" style="margin-bottom:20px">
    <div id="rep-content"></div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyftmXqCv2YbMtPLyHR1ANdJaZ4zTCyNDDrY5shpg_AvwM_ZY7diIM__-a1m7a0xNig/exec';
  let students = [];

  // Function: Switch Pages
  function switchPage(page) {
    document.getElementById('page-attendance').style.display = page === 'attendance' ? 'block' : 'none';
    document.getElementById('page-report').style.display = page === 'report' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(page === 'attendance' ? 'เช็คชื่อ' : 'รายงาน')));
  }

  // Fetch Data
  async function fetchData() {
    const res = await fetch(`${GAS_URL}?action=getStudents`);
    const data = await res.json();
    students = data.students || [];
    renderAttendance();
  }

  function renderAttendance() {
    const list = document.getElementById('att-list');
    list.innerHTML = students.map(s => `
      <div class="card" id="s-${s.phone}">
        <div class="student-info">
          <h3>${s.nickname} <span style="font-size:12px;color:gray">${s.fullname}</span></h3>
          <p>โรงเรียน: ${s.school} | ภาควิชา: ${s.dept}</p>
        </div>
        <button class="btn btn-check" onclick="doCheck(this, '${s.phone}', '${s.nickname}', '${s.school}', '${s.dept}')">เช็คชื่อ</button>
      </div>
    `).join('');
  }

  async function doCheck(btn, phone, nickname, school, dept) {
    btn.textContent = "กำลังบันทึก...";
    const date = document.getElementById('att-date').value;
    
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addLog', date, phone, nickname, school, dept, type: 'ติวสด' })
    });
    
    btn.className = "btn btn-done";
    btn.textContent = "✓ เช็คแล้ว";
  }

  window.onload = fetchData;
</script>

</body>
</html>
