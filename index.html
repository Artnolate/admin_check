<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบเช็คชื่อ — ARTNOLATE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── Tokens ─────────────────────────────── */
:root{
  --primary:#1C2951;
  --accent:#FF8C00;
  --accent-light:#FFE5CC;
  --bg:#F5F7FA;
  --surface:#fff;
  --border:#DDE4ED;
  --border-light:#EEF1F6;
  --txt:#1A1D23;
  --txt2:#6B7280;
  --txt3:#9CA3AF;
  --green:#10B981;
  --green-l:#D1FAE5;
  --orange:#F59E0B;
  --orange-l:#FEF3C7;
  --red:#EF4444;
  --red-l:#FEE2E2;
  --grey:#9CA3AF;
  --grey-l:#F3F4F6;
  --r:10px;
  --rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.07);
  --shm:0 4px 12px rgba(0,0,0,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.6;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
a{color:var(--primary)}

/* ── Header ─────────────────────────────── */
.hdr{
  background:var(--primary);border-bottom:3px solid var(--accent);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  height:60px;position:sticky;top:0;z-index:100;box-shadow:var(--shm);
}
.brand{display:flex;flex-direction:column;line-height:1.15}
.brand-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.brand-sub{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
.sync-info{font-size:12px;color:#fff;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.dot.ok{background:var(--green)}
.dot.err{background:var(--red)}
.dot.loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Tabs ────────────────────────────────── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 20px;gap:2px}
.tab{padding:11px 16px;border:none;background:none;font-size:14px;font-weight:500;color:var(--txt2);
border-bottom:3px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px;transition:color .15s,border-color .15s}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── Pages ───────────────────────────────── */
.page{padding:20px;max-width:1080px;margin:0 auto}
.page{display:none;padding:20px;max-width:1080px;margin:0 auto}
.page.active{display:block}

/* ── Toolbar ─────────────────────────────── */
.toolbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;background:var(--surface);
  padding:14px 16px;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);
  position: sticky;top: 60px;z-index: 90;
}
.lbl{font-size:13px;color:var(--txt2);font-weight:600;white-space:nowrap}
.field{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.field input[type=date],.field input[type=text],.field select{
  padding:8px 12px;border:1px solid var(--border);border-radius:var(--rs);
  background:var(--surface);font-size:14px;color:var(--txt);outline:none;transition:border-color .15s}
.field input[type=date]:focus,.field input[type=text]:focus,.field select:focus{border-color:var(--primary)}
.sep{width:1px;height:30px;background:var(--border)}

/* ── Toggle Switch ───────────────────────── */
.toggle-group{display:flex;gap:6px;align-items:center}
.toggle-btn{
  padding:7px 16px;border:2px solid var(--border);
  background:var(--surface);color:var(--txt2);font-size:13px;font-weight:600;
  border-radius:var(--rs);cursor:pointer;transition:all .2s;white-space:nowrap}
.toggle-btn:hover{border-color:var(--primary);color:var(--primary)}
.toggle-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.toggle-btn.live.active{background:#1C2951;border-color:#1C2951}
.toggle-btn.online.active{background:var(--accent);border-color:var(--accent)}

/* ── Summary chips ───────────────────────── */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid transparent}
.chip-b{background:#E8EFFF;color:var(--primary);border-color:#C7D0FF}
.chip-g{background:var(--green-l);color:#065F46;border-color:#A7F3D0}
.chip-gr{background:var(--grey-l);color:var(--txt2);border-color:var(--border)}

/* ── Student Card ────────────────────────── */
.list{display:flex;flex-direction:column;gap:10px}
.card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);
  transition:all .2s;
}
.card:hover{box-shadow:var(--shm);border-color:var(--primary)}
.card.done{opacity:.65;background:#F9F9F9;border-color:var(--border)}
.card-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.card-info{flex:1;min-width:0}
.name-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.nickname{font-size:16px;font-weight:700;color:var(--primary)}
.fullname{font-size:13px;color:var(--txt2)}
.meta{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:7px;font-size:13px;color:var(--txt2)}
.mi{display:flex;align-items:center;gap:4px}
.mi-ico{font-size:12px}
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600}
.badge-c{background:#E8EFFF;color:var(--primary)}
.alerts{display:flex;flex-direction:column;gap:3px;margin-top:8px}
.alert{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--rs);font-size:12px;font-weight:500}
.alert-w{background:var(--orange-l);color:#92400E}
.alert-d{background:var(--red-l);color:#991B1B}

/* ── Check Buttons ───────────────────────── */
.btns{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
.cbtn{
  display:flex;align-items:center;gap:5px;padding:8px 15px;
  border-radius:var(--rs);border:2px solid var(--border);
  background:var(--surface);color:var(--txt);font-size:13px;font-weight:600;
  transition:all .15s;white-space:nowrap;min-width:120px;justify-content:center}
.cbtn:hover:not(:disabled){border-color:currentColor}
.cbtn.live{color:var(--primary)}
.cbtn.live:hover:not(:disabled){background:var(--primary);color:#fff;border-color:var(--primary)}
.cbtn.online{color:var(--accent)}
.cbtn.online:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent)}
.cbtn.saving{opacity:.6;pointer-events:none}
.cbtn.done{background:#E8F5E9;border-color:var(--green);color:var(--green);pointer-events:none;font-weight:700}
.cbtn.locked{background:var(--grey-l);border-color:var(--border);color:var(--grey);pointer-events:none}

/* ── States ──────────────────────────────── */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;color:var(--txt3);text-align:center;gap:10px}
.state-ico{font-size:40px}
.state p{font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Report Table ────────────────────────── */
.rtable{width:100%;border-collapse:collapse;background:var(--surface);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);font-size:14px}
.rtable thead{background:var(--bg)}
.rtable th{padding:11px 13px;text-align:left;font-size:11px;font-weight:700;
  color:var(--primary);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--primary)}
.rtable td{padding:11px 13px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.rtable tr:last-child td{border-bottom:none}
.rtable tr:hover td{background:#F9F9F9}
.num{color:var(--txt3);font-size:12px;font-weight:600;width:40px;text-align:center}
.pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600}
.pill-live{background:#E8EFFF;color:var(--primary);font-weight:700}
.pill-online{background:#FFE5CC;color:#B8740F;font-weight:700}

/* ── Profile Block ────────────────────────── */
.profile-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:20px;box-shadow:var(--sh);}
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:12px;}
.profile-grid div{font-size:14px;color:var(--txt);}
.profile-grid strong{color:var(--primary);font-weight:600;}

/* ── Toast ───────────────────────────────── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--primary);color:#fff;padding:10px 22px;border-radius:8px;
  font-size:14px;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--green)}
#toast.err{background:var(--red)}

/* ── Responsive ──────────────────────────── */
@media(max-width:768px){
  .page{padding:14px}
  .toolbar{flex-direction:column;align-items:stretch;gap:10px;position:relative;top:0}
  .field{flex-wrap:wrap}
  .sep{display:none}
  .card-row{flex-direction:column;gap:10px}
  .btns{flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:flex-start;gap:5px}
  .cbtn{min-width:auto;padding:7px 12px;font-size:12px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand">
    <span class="brand-title">📋 ระบบเช็คชื่อ</span>
    <span class="brand-sub">ARTNOLATE</span>
  </div>
  <div class="sync-info">
    <div class="dot" id="sync-dot"></div>
    <span id="sync-label">ยังไม่ได้โหลด</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="goTab('attendance',this)">
    ✅ เช็คชื่อ
  </button>
  <button class="tab" onclick="goTab('report',this)">
    📊 รายงานประจำวัน
  </button>
  <button class="tab" onclick="goTab('my-history',this)">
    📜 ประวัติเข้าเรียน
  </button>
</nav>

<div class="page active" id="page-attendance">
  <div class="toolbar">
    <div class="field">
      <span class="lbl">📅 วันที่</span>
      <input type="date" id="att-date" onchange="renderAttendance()"/>
    </div>
    <div class="sep"></div>
    <div class="field">
      <span class="lbl">🎓 รูปแบบการเรียน</span>
      <div class="toggle-group">
        <button class="toggle-btn live active" onclick="setFormat('live',this)">ติวสด</button>
        <button class="toggle-btn online" onclick="setFormat('online',this)">ออนไลน์</button>
      </div>
    </div>
    <div class="sep"></div>
    <div class="field">
      <span class="lbl">📚 ภาควิชา</span>
      <select id="att-dept" onchange="renderAttendance()">
        <option value="">— เลือกภาควิชา —</option>
        <option value="all">ทั้งหมด</option>
        <option value="ศิลปกรรม">ศิลปกรรม</option>
        <option value="สถาปัตยกรรม">สถาปัตยกรรม</option>
        <option value="ภูมิสถาปัตยกรรม">ภูมิสถาปัตยกรรม/สถาปัตยกรรมไทย</option>
        <option value="สถาปัตยกรรมภายใน">สถาปัตยกรรมภายใน/ออกแบบภายใน</option>
        <option value="นิเทศศิลป์">นิเทศศิลป์/ออกแบบการสื่อสาร</option>
        <option value="ภาพยนตร์">ภาพยนตร์</option>
        <option value="อนิเมชัน">อนิเมชัน</option>
        <option value="การถ่ายภาพ">การถ่ายภาพ</option>
        <option value="ศิลปอุตสาหกรรม">ศิลปอุตสาหกรรม/จิวเวลรี่</option>
        <option value="แฟชั่น">แฟชั่น</option>
        <option value="พื้นฐาน">พื้นฐาน</option>
      </select>
    </div>
  </div>

  <div class="chips" id="att-chips" style="display:none">
    <div class="chip chip-b" id="chip-total">👥 0 คน</div>
    <div class="chip chip-g" id="chip-checked">✅ เช็คแล้ว 0</div>
    <div class="chip chip-gr" id="chip-left">⏳ รอเช็ค 0</div>
  </div>

  <div class="list" id="att-list">
    <div class="state">
      <div class="state-ico">🏫</div>
      <p>เลือกภาควิชาเพื่อแสดงรายชื่อนักเรียน</p>
    </div>
  </div>
</div>

<div class="page" id="page-report">
  <div class="toolbar">
    <div class="field">
      <span class="lbl">📅 วันที่</span>
      <input type="date" id="rep-date" onchange="renderReport()"/>
    </div>
  </div>
  <div id="rep-content">
    <div class="state"><div class="state-ico">📊</div><p>เลือกวันที่เพื่อดูรายงาน</p></div>
  </div>
</div>

<div class="page" id="page-my-history">
  <div class="toolbar">
    <div class="field">
      <span class="lbl">🔍 ค้นหาประวัติด้วยชื่อเล่น</span>
      <input type="text" id="history-nickname" placeholder="ระบุชื่อเล่น" style="min-width:180px;"/>
      <button class="cbtn live" onclick="fetchStudentHistory()" style="min-width:80px; padding:8px 20px;">🔍 ค้นหา</button>
    </div>
  </div>

  <div id="history-selector-container" style="margin-bottom: 16px; display: none;">
    <div class="field" style="background: var(--surface); padding: 12px 16px; border-radius: var(--r); border: 1px solid var(--accent); box-shadow: var(--sh);">
      <span class="lbl" style="color: var(--accent);">⚠️ พบชื่อซ้ำกัน โปรดเลือกข้อมูล</span>
      <select id="history-student-select" onchange="onHistoryStudentSelectChange()" style="padding:8px 12px; min-width: 280px; border-color: var(--accent);">
      </select>
    </div>
  </div>

  <div id="history-content">
    <div class="state">
      <div class="state-ico">🔍</div>
      <p>กรอกชื่อเล่นเพื่อตรวจสอบประวัติการเข้าเรียน</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ─────────────────────────────────────────
   CONFIG
───────────────────────────────────────── */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw6_JEBX8IJ9YU-EGXjARP6KZkCdjKa9Kfkw_O1yj_T8Su9xpVaUZrUL3wsj2HlUWK9/exec';

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let students    = [];
let logCache    = [];
let logDate     = '';
let checked     = {};
let formatMode  = 'live';
let historyData = { students: [], logs: [] }; // จัดเก็บข้อมูลผลลัพธ์จากการค้นหาประวัติย้อนหลังล่าสุด

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const today = todayISO();
  document.getElementById('att-date').value = today;
  document.getElementById('rep-date').value = today;
  loadLocal();
  fetchStudents();
});

function setFormat(mode, el) {
  formatMode = mode;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderAttendance();
}

/* ─────────────────────────────────────────
   GAS API CALLS
───────────────────────────────────────── */
function gasCall(params) {
  const qs = new URLSearchParams(params).toString();
  return fetch(`${GAS_URL}?${qs}`).then(r => r.json());
}
function gasPost(body) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  }).then(r => r.json());
}

async function fetchStudents() {
  setSyncState('loading','กำลังโหลด…');
  try {
    const data = await gasCall({ action: 'getStudents' });
    if (data.error) throw new Error(data.error);
    students = data.students || [];
    setSyncState('ok', `โหลดแล้ว ${students.length} คน`);
    renderAttendance();
  } catch(e) {
    setSyncState('err', 'โหลดไม่สำเร็จ — ' + e.message);
    showList(`<div class="state"><div class="state-ico">⚠️</div><p>โหลดข้อมูลไม่สำเร็จ<br><small>${e.message}</small></p></div>`);
  }
}

async function fetchLog(date) {
  if (logDate === date) return logCache;
  try {
    const data = await gasCall({ action: 'getLog', date });
    logCache = data.rows || [];
    logDate  = date;
    return logCache;
  } catch {
    return [];
  }
}

function courseMatchesFormat(courseRaw, format) {
  if (!courseRaw) return false;
  const c = String(courseRaw).toLowerCase();
  if (format === 'live') {
    return /เหมา|mix|ติวสด/.test(c);
  } else {
    return /ออนไลน์|mix|เหมา/.test(c);
  }
}

function buildBtns(s, date, serverChecked) {
  const c = s.courseRaw || '';
  const cLower = String(c).toLowerCase();

  if (formatMode === 'live') {
    const done = serverChecked.has(`${normPhone(s.phone)}__ติวสด`);
    return [{ type: 'ติวสด', label: '✏️ ติวสด', class: 'live', done }];
  } else {
    let types = [];
    if (/buffet|mix|เหมา/i.test(cLower)) {
      types = [
        { type: 'วิชาภาค', label: '📚 วิชาภาค', class: 'online' },
        { type: 'วาดเส้น', label: '🖊️ วาดเส้น', class: 'online' }
      ];
    } else if (/\[10\s*ครั้ง/.test(cLower)) {
      types = [{ type: 'วิชาภาค', label: '📚 วิชาภาค', class: 'online' }];
    } else if (/\[12\s*ครั้ง/.test(cLower)) {
      types = [{ type: 'วาดเส้น', label: '🖊️ วาดเส้น', class: 'online' }];
    } else {
      types = [{ type: 'วิชาภาค', label: '📚 วิชาภาค', class: 'online' }];
    }
    return types.map(t => ({
      ...t,
      done: serverChecked.has(`${normPhone(s.phone)}__${t.type}`)
    }));
  }
}

/* ─────────────────────────────────────────
   RENDER RENDER ATTENDANCE
───────────────────────────────────────── */
async function renderAttendance() {
  const date  = document.getElementById('att-date').value;
  const dept  = document.getElementById('att-dept').value;
  const chips = document.getElementById('att-chips');

  if (!dept) {
    chips.style.display = 'none';
    showList(`<div class="state"><div class="state-ico">🏫</div><p>เลือกภาควิชาเพื่อแสดงรายชื่อนักเรียน</p></div>`);
    return;
  }
  if (!students.length) {
    chips.style.display = 'none';
    showList(`<div class="state"><div class="spinner"></div><p>กำลังโหลดข้อมูล…</p></div>`);
    return;
  }

  let list = students.filter(s => {
    const dm = (dept === 'all') || (s.dept && s.dept.includes(dept));
    const fm = courseMatchesFormat(s.courseRaw, formatMode);
    return dm && fm;
  });

  if (!list.length) {
    chips.style.display = 'none';
    showList(`<div class="state"><div class="state-ico">🔍</div><p>ไม่พบนักเรียนในหมวดนี้</p></div>`);
    return;
  }

  const logRows = await fetchLog(date);
  const serverChecked = new Set();
  logRows.forEach(r => {
    if (r.phone && r.type) serverChecked.add(`${normPhone(r.phone)}__${r.type}`);
  });

  const today   = new Date(date);
  const warn7   = new Date(date);
  warn7.setDate(warn7.getDate() + 7);

  let checkedCount = 0;
  const cards = list.map(s => {
    const btns = buildBtns(s, date, serverChecked);
    const anyDone = btns.some(b => b.done);
    if (anyDone) checkedCount++;

    if (formatMode === 'online' && anyDone) {
      btns.forEach(b => { if (!b.done) b.locked = true; });
    }

    const isMao   = /เหมา|mix/i.test(s.courseRaw);
    const remNum  = parseInt(s.remaining);
    const showRem = isMao ? '—' : (isNaN(remNum) ? s.remaining : remNum);
    let alerts = '';
    
    if (!isMao && !isNaN(remNum) && remNum <= 2) {
      alerts += remNum === 0
        ? `<div class="alert alert-d">⚠️ ครั้งเรียนหมดแล้ว</div>`
        : `<div class="alert alert-w">⏳ เหลือ ${remNum} ครั้ง</div>`;
    }
    if (s.expiry) {
      const exp = parseDateAny(s.expiry);
      if (exp) {
        if (exp <= today)      alerts += `<div class="alert alert-d">🗓️ อายุหมดแล้ว</div>`;
        else if (exp <= warn7) alerts += `<div class="alert alert-w">🗓️ หมดเร็ว — ${fmtDate(s.expiry)}</div>`;
      }
    }

    return `
<div class="card${anyDone?' done':''}" id="card-${esc(s.phone)}">
  <div class="card-row">
    <div class="card-info">
      <div class="name-row">
        <span class="nickname">${esc(s.nickname)}</span>
        <span class="fullname">${esc(s.fullname)}</span>
      </div>
      <div class="meta">
        <span class="mi"><span class="mi-ico">🏫</span>${esc(s.school)}</span>
        <span class="mi"><span class="mi-ico">🎓</span>${esc(s.dept)}</span>
      </div>
      <div class="meta" style="margin-top:6px">
        <span class="badge badge-c">${esc(s.courseRaw)}</span>
        ${!isMao?`<span class="mi"><span class="mi-ico">🔢</span>${esc(String(showRem))} ครั้ง</span>`:''}
        ${s.expiry?`<span class="mi"><span class="mi-ico">📆</span>${fmtDate(s.expiry)}</span>`:''}
      </div>
      ${alerts?`<div class="alerts">${alerts}</div>`:''}
    </div>
    <div class="btns" id="btns-${esc(s.phone)}">
      ${btns.map(b => renderCBtn(b, s, date)).join('')}
    </div>
  </div>
</div>`;
  });

  showList(cards.join(''));
  chips.style.display = 'flex';
  document.getElementById('chip-total').textContent   = `👥 ${list.length} คน`;
  document.getElementById('chip-checked').textContent  = `✅ เช็คแล้ว ${checkedCount}`;
  document.getElementById('chip-left').textContent     = `⏳ รอเช็ค ${list.length - checkedCount}`;
}

function renderCBtn(b, s, date) {
  if (b.done) return `<button class="cbtn done">${b.label} ✓</button>`;
  if (b.locked) return `<button class="cbtn locked">${b.label}</button>`;
  const onclick = `doCheck(this,'${esc(s.phone)}','${esc(s.nickname)}','${esc(s.school)}','${esc(s.dept)}','${b.type}','${esc(b.label)}','${date}','${esc(s.round)}')`;
  return `<button class="cbtn ${b.class}" onclick="${onclick}">${b.label}</button>`;
}

/* ─────────────────────────────────────────
   ACTION CONTROL
───────────────────────────────────────── */
async function doCheck(btnEl, phone, nickname, school, dept, type, label, date, round) {
  if (btnEl.classList.contains('saving') || btnEl.classList.contains('done') || btnEl.classList.contains('locked')) return;
  btnEl.classList.add('saving');
  btnEl.textContent = '⏳…';

  try {
    const resp = await gasPost({ action: 'addLog', date, phone, nickname, school, dept, round, type });
    if (resp && resp.error) throw new Error(resp.error);

    markLocal(phone, date, type);
    logCache.push({ date, phone, nickname, school, dept, round, type });
    btnEl.classList.remove('saving');
    
    await renderAttendance();
    showToast(`✅ ${nickname} — ${label}`, 'ok');
  } catch(e) {
    btnEl.classList.remove('saving');
    btnEl.textContent = label;
    showToast('❌ ' + e.message, 'err');
  }
}

/* ─────────────────────────────────────────
   RENDER REPORT
───────────────────────────────────────── */
async function renderReport() {
  const date = document.getElementById('rep-date').value;
  const box  = document.getElementById('rep-content');
  box.innerHTML = `<div class="state"><div class="spinner"></div><p>กำลังโหลด…</p></div>`;

  try {
    const data = await gasCall({ action: 'getLog', date });
    const allRows = data.rows || [];
    const rows = allRows.filter(r => isSameDate(r.date, date));
    if (!rows.length) {
      box.innerHTML = `<div class="state"><div class="state-ico">📭</div><p>ไม่มีข้อมูลวันที่ ${fmtDateISO(date)}</p></div>`;
      return;
    }

    let liveCount = 0, onlineCount = 0;
    rows.forEach(r => {
      if (r.type && r.type.includes('ติวสด')) liveCount++;
      else if (r.type) onlineCount++;
    });
    const tbody = rows.map((r,i) => `
<tr>
  <td class="num">${i+1}</td>
  <td><strong>${esc(r.nickname||'')}</strong></td>
  <td style="font-size:13px;color:var(--txt2)">${esc(r.school||'-')}</td>
  <td style="font-size:13px;color:var(--txt2)">${esc(r.dept||'-')}</td>
  <td><span class="pill ${pillClass(r.type)}">${esc(r.type||'')}</span></td>
</tr>`).join('');
    box.innerHTML = `
<div class="chips">
  <div class="chip chip-b">📋 ${fmtDateISO(date)} — ${rows.length} รายการ</div>
  <div class="chip chip-b">✏️ ติวสด ${liveCount}</div>
  <div class="chip chip-b">📚 ออนไลน์ ${onlineCount}</div>
</div>
<table class="rtable">
  <thead><tr><th>#</th><th>ชื่อเล่น</th><th>โรงเรียน</th><th>ภาควิชา</th><th>รูปแบบ</th></tr></thead>
  <tbody>${tbody}</tbody>
</table>`;
  } catch(e) {
    box.innerHTML = `<div class="state"><div class="state-ico">⚠️</div><p>โหลดไม่สำเร็จ: ${e.message}</p></div>`;
  }
}

/* ─────────────────────────────────────────
   STUDENT HISTORY LOOKUP (NEW CONDITION)
───────────────────────────────────────── */
async function fetchStudentHistory() {
  const nicknameInput = document.getElementById('history-nickname').value.trim();
  const box = document.getElementById('history-content');
  const selectorContainer = document.getElementById('history-selector-container');
  const selectEl = document.getElementById('history-student-select');

  if (!nicknameInput) {
    showToast('❌ กรุณากรอกชื่อเล่นสำหรับค้นหา', 'err');
    return;
  }

  // เคลียร์ผลลัพธ์เดิมและเปิดสถานะ Loading
  selectorContainer.style.display = 'none';
  selectEl.innerHTML = '';
  box.innerHTML = `<div class="state"><div class="spinner"></div><p>กำลังค้นหาข้อมูลของคุณ…</p></div>`;

  try {
    // ส่งคำขอค้นหาไปยัง backend โดยอิงตามชื่อเล่น
    const data = await gasCall({ action: 'getStudentHistory', nickname: nicknameInput });
    historyData = data; 
    
    const studentsList = data.students || [];

    if (!studentsList.length) {
      box.innerHTML = `<div class="state"><div class="state-ico">📭</div><p>ไม่พบประวัติการเรียนของชื่อเล่น "${esc(nicknameInput)}"<br><small>กรุณาตรวจสอบความถูกต้อง หรือติดต่อแอดมิน</small></p></div>`;
      return;
    }

    if (studentsList.length === 1) {
      // มีชื่อนี้เพียงคนเดียวในระบบ → แสดงตารางข้อมูลทันที
      renderStudentHistoryData(studentsList[0].phone);
    } else {
      // มีชื่อซ้ำกันหลายคนในระบบ → แปลงข้อมูลเป็น Dropdown แยกตามเบอร์โทรศัพท์และโรงเรียน
      selectEl.innerHTML = `<option value="">— กรุณาเลือกข้อมูลของคุณเพื่อตรวจสอบ —</option>` + 
        studentsList.map(s => {
          const formattedPhone = s.phone ? s.phone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3') : 'ไม่ระบุเบอร์';
          return `<option value="${esc(s.phone)}">${esc(s.nickname)} (เบอร์: ${esc(formattedPhone)}) — โรงเรียน ${esc(s.school || 'ไม่ระบุ')}</option>`;
        }).join('');
      
      selectorContainer.style.display = 'block';
      box.innerHTML = `<div class="state"><div class="state-ico">👆</div><p>พบชื่อเล่นซ้ำกัน ${studentsList.length} คน<br>กรุณาเลือกข้อมูลของคุณที่ตัวเลือกด้านบน</p></div>`;
    }
  } catch(e) {
    box.innerHTML = `<div class="state"><div class="state-ico">⚠️</div><p>เกิดข้อผิดพลาด: ${e.message}</p></div>`;
  }
}

// ฟังก์ชันเมื่อผู้เรียนคลิกเลือกประวัติจากเมนู Dropdown
function onHistoryStudentSelectChange() {
  const selectedPhone = document.getElementById('history-student-select').value;
  if (selectedPhone) {
    renderStudentHistoryData(selectedPhone);
  } else {
    document.getElementById('history-content').innerHTML = `<div class="state"><div class="state-ico">👆</div><p>กรุณาเลือกข้อมูลของคุณที่ช่องด้านบน</p></div>`;
  }
}

// ฟังก์ชันสำหรับ Render ข้อมูลส่วนตัวด้านบน และจัดตารางแสดงผลประวัติการเรียน
function renderStudentHistoryData(selectedPhone) {
  const box = document.getElementById('history-content');
  const student = historyData.students.find(s => s.phone === selectedPhone);
  
  if (!student) {
    box.innerHTML = `<div class="state"><div class="state-ico">⚠️</div><p>ไม่พบโปรไฟล์นักเรียนที่เลือก</p></div>`;
    return;
  }

  // ล้างเบอร์โทรศัพท์เพื่อคัดกรอง Log
  const cleanSelectedPhone = String(selectedPhone).replace(/[^0-9]/g, '').replace(/^0+/, '');
  const studentLogs = (historyData.logs || []).filter(l => {
    return String(l.phone).replace(/[^0-9]/g, '').replace(/^0+/, '') === cleanSelectedPhone;
  });

  const displayPhone = student.phone ? student.phone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3') : '—';
  
  // 1. Render แผงแสดงข้อมูลนักเรียนไว้ที่ด้านบนสุด
  let headerHtml = `
  <div class="profile-block">
    <div class="profile-grid">
      <div><strong>👤 ชื่อเล่น:</strong> ${esc(student.nickname)}</div>
      <div><strong>🏫 โรงเรียน:</strong> ${esc(student.school || '—')}</div>
      <div><strong>📱 เบอร์โทรศัพท์:</strong> ${esc(displayPhone)}</div>
      <div><strong>🎓 ภาควิชา:</strong> ${esc(student.dept || '—')}</div>
    </div>
  </div>`;

  if (!studentLogs.length) {
    box.innerHTML = headerHtml + `<div class="state"><div class="state-ico">📭</div><p>ไม่พบประวัติการเช็คชื่อเข้าเรียนของนักเรียนคนนี้</p></div>`;
    return;
  }

  // 2. จัดกลุ่ม Log เข้าเรียนตาม "รอบคอร์สเรียน"
  const roundsMap = {};
  studentLogs.forEach(l => {
    const rName = l.round || 'ไม่ระบุรอบคอร์ส';
    if (!roundsMap[rName]) roundsMap[rName] = [];
    roundsMap[rName].push(l);
  });

  let tablesHtml = '';

  // 3. วนลูปตารางแสดงผลแยกตามรอบคอร์สเรียน พร้อมรันจำนวนครั้งเรียนจากเก่าไปใหม่ (วันที่เรียนแรกสุด = ครั้งที่ 1)
  Object.keys(roundsMap).forEach(rName => {
    // เรียงวันที่จากอดีตไปปัจจุบัน (Ascending) เพื่อรัน "ครั้งที่ 1, 2, 3..." ตามลำดับเวลาจริงที่คุณต้องการ
    const sortedLogs = roundsMap[rName].sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());
    
    const tbody = sortedLogs.map((r, index) => `
    <tr>
      <td class="num" style="width: 120px; text-align: center; font-weight: bold; color: var(--primary);">ครั้งที่ ${index + 1}</td>
      <td>${fmtDateISO(r.date)}</td>
      <td><span class="pill ${pillClass(r.type)}">${esc(r.type || '—')}</span></td>
    </tr>`).join('');

    tablesHtml += `
    <div style="margin-bottom: 25px;">
      <div class="chip chip-b" style="margin-bottom: 10px; font-size: 14px; font-weight: 700; border-radius: var(--rs);">
        🔄 รอบคอร์สเรียน: ${esc(rName)} (เข้าเรียนสะสมในรอบนี้ ${sortedLogs.length} ครั้ง)
      </div>
      <table class="rtable">
        <thead>
          <tr>
            <th style="width: 130px; text-align: center;">ครั้งที่เข้าเรียน</th>
            <th>วันที่เข้าเรียน</th>
            <th>รูปแบบวิชา</th>
          </tr>
        </thead>
        <tbody>
          ${tbody}
        </tbody>
      </table>
    </div>`;
  });

  box.innerHTML = headerHtml + tablesHtml;
}

function pillClass(t) {
  if (!t) return '';
  if (t.includes('ติวสด')) return 'pill-live';
  return 'pill-online';
}

/* ─────────────────────────────────────────
   LOCAL STORAGE KEYS
───────────────────────────────────────── */
function lcKey(ph, dt, tp) { return `anl__${ph}__${dt}__${tp}`; }
function loadLocal() {
  try { checked = JSON.parse(localStorage.getItem('anl_checked')||'{}'); } catch{ checked={}; }
}
function markLocal(ph, dt, tp) { checked[lcKey(ph,dt,tp)]=true; localStorage.setItem('anl_checked',JSON.stringify(checked)); }

/* ─────────────────────────────────────────
   HELPERS & UTILS
───────────────────────────────────────── */
function todayISO() { return new Date().toISOString().slice(0,10); }
function normPhone(p) { return String(p || '').replace(/[^0-9]/g, '').replace(/^0+/, ''); }
function isSameDate(logDateStr, targetIso) {
  if (!logDateStr || !targetIso) return false;
  return logDateStr.includes(targetIso) || targetIso.includes(logDateStr);
}
function parseDateAny(str) {
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}
function fmtDate(str) {
  const d = parseDateAny(str);
  if (!d) return str;
  return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'});
}
function fmtDateISO(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showList(html) { document.getElementById('att-list').innerHTML = html; }
function setSyncState(st, msg) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'dot ' + st;
  lbl.textContent = msg;
}

let tTimer;
function showToast(msg, cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + cls;
  clearTimeout(tTimer);
  tTimer = setTimeout(()=>{ t.className=''; }, 2800);
}

function goTab(tab, el) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if (tab === 'report') renderReport();
}
</script>
