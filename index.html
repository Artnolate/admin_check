<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเช็คชื่อ ARTNOLATE</title>
<style>
:root {
  --navy: #1a365d;
  --navy-dark: #0f172a;
  --navy-light: #f0f4f8;
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --success: #10b981;
  --success-bg: #d1fae5;
  --warning: #f59e0b;
  --warning-bg: #fef3c7;
  --danger: #ef4444;
  --danger-bg: #fee2e2;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-900: #0f172a;
  
  --tutor-color: #3b82f6;
  --draw-color: #8b5cf6;
  --online-color: #ec4899;
  
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --radius: 12px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Kanit', 'Inter', sans-serif;
}

body {
  background-color: #f4f6f9;
  color: var(--gray-900);
  padding: 16px;
  display: flex;
  justify-content: center;
}

.app-wrapper {
  width: 100%;
  max-width: 900px;
  background: transparent;
}

/* ===== HEADER ===== */
.app-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
  padding: 16px 20px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 16px;
}

@media(min-width: 640px) {
  .app-header {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-icon {
  background: rgba(255, 255, 255, 0.15);
  padding: 8px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.brand-text {
  display: flex;
  flex-direction: column;
}

.brand-text .t1 {
  font-size: 14px;
  color: var(--gray-300);
  font-weight: 300;
  letter-spacing: 0.5px;
}

.brand-text .t2 {
  font-size: 20px;
  color: #ffffff;
  font-weight: 700;
  letter-spacing: 1px;
}

.tab-nav {
  display: flex;
  gap: 8px;
  background: rgba(0, 0, 0, 0.2);
  padding: 4px;
  border-radius: 10px;
}

.tab-btn {
  background: transparent;
  border: none;
  color: var(--gray-300);
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
}

.tab-btn:hover { color: #fff; }

.tab-btn.active {
  background: #ffffff;
  color: var(--navy);
  box-shadow: var(--shadow-sm);
}

/* ===== FILTER BAR ===== */
.filter-bar {
  background: #ffffff;
  padding: 16px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
}

.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: flex-end;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 150px;
}

.filter-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-600);
  display: flex;
  align-items: center;
  gap: 4px;
}

.form-control {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  border: 1px solid var(--gray-300);
  border-radius: 8px;
  outline: none;
  background-color: var(--gray-50);
  color: var(--gray-900);
  transition: all 0.2s;
}

.form-control:focus {
  border-color: var(--primary);
  background-color: #fff;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.mode-pills {
  display: flex;
  background: var(--gray-100);
  padding: 4px;
  border-radius: 8px;
  border: 1px solid var(--gray-200);
}

.pill-btn {
  flex: 1;
  background: transparent;
  border: 1px solid transparent;
  padding: 6px 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-600);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.pill-btn.active {
  background: #ffffff;
  color: var(--navy);
  border-color: var(--gray-200);
  box-shadow: var(--shadow-sm);
  font-weight: 600;
}

/* ===== SUMMARY STRIP ===== */
.summary-strip {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  margin-bottom: 12px;
}

.sum-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--gray-600);
  margin-right: 4px;
}

.chip {
  background: var(--gray-200);
  color: var(--gray-700);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}

.chip .num { font-weight: 700; }
.chip.grn { background: var(--success-bg); color: var(--success); }
.chip.org { background: var(--warning-bg); color: var(--warning); }

/* ===== STUDENT CARD ===== */
.student-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.student-card {
  background: #ffffff;
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  overflow: hidden;
  border-left: 4px solid var(--gray-300);
  transition: transform 0.2s, box-shadow 0.2s;
}

@media(min-width: 640px) {
  .student-card {
    flex-direction: row;
    align-items: center;
  }
}

.student-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.student-card.all-locked {
  border-left-color: var(--success);
  background: var(--gray-50);
}

.avatar {
  width: 42px;
  height: 42px;
  background: var(--navy-light);
  color: var(--navy);
  font-size: 18px;
  font-weight: 700;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.card-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.name-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
}

.s-nickname {
  font-size: 16px;
  font-weight: 700;
  color: var(--gray-900);
}

.s-fullname {
  font-size: 14px;
  color: var(--gray-600);
  margin-right: 4px;
}

.tag {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
}

.tag.dept { background: var(--navy-light); color: var(--navy); }

.tag.period {
  background: var(--gray-100);
  color: var(--gray-700);
  border: 1px solid var(--gray-200);
}

.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 12px;
  color: var(--gray-600);
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.meta-item svg { color: var(--gray-400); }
.meta-item.warn { color: var(--danger); font-weight: 600; }
.meta-item.warn svg { color: var(--danger); }
.meta-item.soft { color: var(--gray-400); }

/* Warn Banners */
.warn-banner {
  background: var(--warning-bg);
  color: #b45309;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 10px;
  border-radius: 6px;
  margin-top: 4px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.warn-banner.red {
  background: var(--danger-bg);
  color: var(--danger);
  font-weight: 600;
}

/* Card Actions / Buttons */
.card-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

@media(min-width: 640px) {
  .card-actions {
    justify-content: flex-end;
    min-width: 140px;
  }
}

.btn-check {
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}

.btn-check.tutor { background: var(--tutor-color); color: white; }
.btn-check.tutor:hover { background: #2563eb; }

.btn-check.draw { background: var(--draw-color); color: white; }
.btn-check.draw:hover { background: #7c3aed; }

.btn-check.online { background: var(--online-color); color: white; }
.btn-check.online:hover { background: #db2777; }

.btn-check.locked-btn {
  background: var(--gray-100);
  color: var(--gray-400);
  border: 1px solid var(--gray-200);
  cursor: not-allowed;
  box-shadow: none;
}

/* ===== REPORT TABLE ===== */
.report-table-wrap {
  background: #ffffff;
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow-x: auto;
}

.report-table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
  font-size: 14px;
}

.report-table th {
  background: var(--gray-100);
  color: var(--gray-700);
  padding: 12px 16px;
  font-weight: 600;
  border-bottom: 2px solid var(--gray-200);
}

.report-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  color: var(--gray-700);
}

.report-table tr:last-child td { border-bottom: none; }

.mode-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 12px;
  color: white;
  display: inline-block;
}

.mode-badge.tutor { background: var(--tutor-color); }
.mode-badge.draw { background: var(--draw-color); }
.mode-badge.online { background: var(--online-color); }

/* ===== UTILITIES ===== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-400);
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}

.empty-state svg {
  margin-bottom: 8px;
  stroke: var(--gray-300);
}

.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(2px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255, 255, 255, 0.3);
  border-top-color: #ffffff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.toast-wrap {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 10000;
  width: 90%;
  max-width: 350px;
}

.toast {
  background: #ffffff;
  color: var(--gray-900);
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-md);
  border-left: 4px solid var(--gray-400);
  animation: slideUp 0.3s ease-out;
}

.toast.ok { border-left-color: var(--success); }
.toast.err { border-left-color: var(--danger); }

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>
</head>
<body>
<div class="app-wrapper">

  <header class="app-header">
    <div class="header-brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="8" y1="14" x2="8" y2="14" stroke-width="3"/>
          <line x1="12" y1="14" x2="12" y2="14" stroke-width="3"/>
          <line x1="8" y1="18" x2="8" y2="18" stroke-width="3"/>
          <line x1="12" y1="18" x2="12" y2="18" stroke-width="3"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="t1">ระบบเช็คชื่อ</span>
        <span class="t2">ARTNOLATE</span>
      </div>
    </div>
    <nav class="tab-nav">
      <button class="tab-btn active" id="tab-checkin" onclick="switchTab('checkin')">
        ✅&nbsp; เช็คชื่อ
      </button>
      <button class="tab-btn" id="tab-report" onclick="switchTab('report')">
        📋&nbsp; รายงานประจำวัน
      </button>
    </nav>
  </header>

  <div id="page-checkin">
    <div class="filter-bar">
      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
            วันที่
          </span>
          <input type="date" id="checkin-date" class="form-control" onchange="onDateChange()" />
        </div>

        <div class="filter-group">
          <span class="filter-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            รูปแบบ
          </span>
          <div class="mode-pills">
            <button class="pill-btn active" id="pill-tutor" onclick="setMode('ติวสด')">ติวสด</button>
            <button class="pill-btn" id="pill-online" onclick="setMode('ออนไลน์')">ออนไลน์</button>
          </div>
        </div>

        <div class="filter-group">
          <span class="filter-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ภาควิชา
          </span>
          <select id="filter-dept" class="form-control" onchange="renderList()">
            <option value="all">ทั้งหมด</option>
            <option value="ศิลปกรรม">ศิลปกรรม</option>
            <option value="สถาปัตยกรรม">สถาปัตยกรรม</option>
            <option value="ภูมิสถาปัตยกรรม">ภูมิสถาปัตยกรรม / สถาปัตยกรรมไทย</option>
            <option value="สถาปัตยกรรมภายใน">สถาปัตยกรรมภายใน / ออกแบบภายใน</option>
            <option value="นิเทศศิลป์">นิเทศศิลป์ / ออกแบบการสื่อสาร</option>
            <option value="ภาพยนตร์">ภาพยนตร์</option>
            <option value="อนิเมชัน">อนิเมชัน</option>
            <option value="การถ่ายภาพ">การถ่ายภาพ</option>
            <option value="ศิลปอุตสาหกรรม">ศิลปอุตสาหกรรม / จิวเวลรี่</option>
            <option value="แฟชั่น">แฟชั่น</option>
            <option value="พื้นฐาน">พื้นฐาน</option>
          </select>
        </div>

        <button class="pill-btn" onclick="loadCheckin()" style="border-color:var(--navy);color:var(--navy); max-height:40px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="vertical-align:-2px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          รีเฟรช
        </button>
      </div>
    </div>

    <div class="summary-strip">
      <span class="sum-label">สรุป</span>
      <div class="chip">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        แสดง <span class="num" id="cnt-show">0</span>
      </div>
      <div class="chip grn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        เช็คแล้ว <span class="num" id="cnt-checked">0</span>
      </div>
      <div class="chip org" id="chip-pending">
        รอเช็ค <span class="num" id="cnt-pending">0</span>
      </div>
    </div>

    <div class="section-body">
      <div class="student-list" id="student-list">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <p>กำลังโหลดข้อมูล...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="page-report" style="display:none">
    <div class="filter-bar">
      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
            วันที่
          </span>
          <input type="date" id="report-date" class="form-control" onchange="loadReport()" />
        </div>
        <button class="pill-btn" onclick="loadReport()" style="border-color:var(--navy);color:var(--navy); max-height:40px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="vertical-align:-2px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          โหลดใหม่
        </button>
      </div>
    </div>

    <div class="summary-strip">
      <span class="sum-label">รายงาน</span>
      <div class="chip">รวม <span class="num" id="r-total">0</span></div>
      <div class="chip">ติวสด <span class="num" id="r-tutor">0</span></div>
      <div class="chip org">ออนไลน์ <span class="num" id="r-online">0</span></div>
    </div>

    <div class="section-body">
      <div class="report-table-wrap">
        <table class="report-table">
          <thead>
            <tr>
              <th>#</th>
              <th>ชื่อเล่น</th>
              <th>โรงเรียน</th>
              <th>ภาควิชา</th>
              <th>รูปแบบ</th>
            </tr>
          </thead>
          <tbody id="report-body"></tbody>
        </table>
      </div>
      <div id="report-empty" class="empty-state" style="display:none">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <p>ไม่มีรายชื่อในวันที่เลือก</p>
      </div>
    </div>
  </div>

</div><div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ============================================================
// STATE & CONFIG
// ============================================================
let allStudents = [];
let checkedMap  = {};   // { "0812345678": ["ติวสด", "วิชาภาค"] }
let currentMode = 'ติวสด';
let currentDate = '';

// วาง URL ของ Web App ที่ได้จาก Google Apps Script ที่นี่
const GAS_URL = 'https://script.google.com/macros/s/AKfycbydiV31SspWt7Y9kyTOIa09f1AzzgVQQiw_6h5-Ez6qk4ScQ_OgXjHnQJ1aoXvDBnuu/exec';

const DEPT_KEYS = {
  'ศิลปกรรม':          ['ศิลปกรรม'],
  'สถาปัตยกรรม':       ['สถาปัตยกรรม'],
  'ภูมิสถาปัตยกรรม':   ['ภูมิสถาปัตยกรรม','สถาปัตยกรรมไทย'],
  'สถาปัตยกรรมภายใน':  ['สถาปัตยกรรมภายใน','ออกแบบภายใน'],
  'นิเทศศิลป์':        ['นิเทศศิลป์','ออกแบบการสื่อสาร'],
  'ภาพยนตร์':          ['ภาพยนตร์'],
  'อนิเมชัน':          ['อนิเมชัน'],
  'การถ่ายภาพ':        ['การถ่ายภาพ'],
  'ศิลปอุตสาหกรรม':    ['ศิลปอุตสาหกรรม','จิวเวลรี่'],
  'แฟชั่น':            ['แฟชั่น'],
  'พื้นฐาน':           ['พื้นฐาน'],
};

// ============================================================
// GAS BRIDGE — เรียกฟังก์ชันใน Code.gs
// ============================================================
async function callGAS(fn, ...args) {
  const url = new URL(GAS_URL);
  
  if (fn === 'saveAttendance') {
    const response = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveAttendance', data: args[0] })
    });
    return await response.json();
  } else {
    url.searchParams.append('action', fn);
    if (args[0]) url.searchParams.append('dateStr', args[0]);
    
    const response = await fetch(url, { method: 'GET' });
    return await response.json();
  }
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const today = todayStr();
  currentDate = today;
  document.getElementById('checkin-date').value = today;
  document.getElementById('report-date').value  = today;
  loadCheckin();
});

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
const pad = n => String(n).padStart(2,'0');

// ============================================================
// TAB SWITCH
// ============================================================
function switchTab(tab) {
  document.getElementById('page-checkin').style.display = tab==='checkin' ? '' : 'none';
  document.getElementById('page-report').style.display  = tab==='report'  ? '' : 'none';
  document.getElementById('tab-checkin').classList.toggle('active', tab==='checkin');
  document.getElementById('tab-report').classList.toggle('active',  tab==='report');
  if (tab === 'report') loadReport();
}

// ============================================================
// LOAD CHECKIN
// ============================================================
async function loadCheckin() {
  showLoad(true);
  try {
    const [sRes, aRes] = await Promise.all([
      callGAS('getStudents'),
      callGAS('getAttendanceToday', currentDate)
    ]);
    if (!sRes.success) throw new Error(sRes.error);
    if (!aRes.success) throw new Error(aRes.error);
    allStudents = sRes.data;
    checkedMap  = aRes.checkedPhones || {};
    renderList();
  } catch(e) {
    toast('โหลดข้อมูลไม่สำเร็จ: ' + e.message, 'err');
    document.getElementById('student-list').innerHTML =
      `<div class="empty-state"><p>❌ ${esc(e.message)}</p></div>`;
  } finally {
    showLoad(false);
  }
}

// ============================================================
// DATE & MODE CHANGE
// ============================================================
function onDateChange() {
  currentDate = document.getElementById('checkin-date').value;
  showLoad(true);
  callGAS('getAttendanceToday', currentDate)
    .then(res => {
      checkedMap = (res && res.success) ? (res.checkedPhones||{}) : {};
      renderList();
    })
    .catch(e => toast('โหลดสถานะไม่สำเร็จ: '+e.message,'err'))
    .finally(()=>showLoad(false));
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('pill-tutor').classList.toggle('active',  mode==='ติวสด');
  document.getElementById('pill-online').classList.toggle('active', mode==='ออนไลน์');
  renderList();
}

// ============================================================
// FILTER HELPERS
// ============================================================
function matchMode(s, mode) {
  const c = s.course.toLowerCase();
  if (mode === 'ติวสด')
    return c.includes('เหมา') || c.includes('mix') || (c.includes('ติวสด') && !c.includes('ออนไลน์'));
  return c.includes('ออนไลน์') || c.includes('mix') || c.includes('เหมา');
}

function matchDept(studentDept, sel) {
  if (sel === 'all') return true;
  const d = studentDept.toLowerCase();
  return (DEPT_KEYS[sel] || [sel]).some(k => d.includes(k.toLowerCase()));
}

function btnMatchesMode(btn, mode) {
  if (mode === 'ติวสด') return btn === 'ติวสด';
  return btn === 'วิชาภาค' || btn === 'วาดเส้น' || btn === 'ออนไลน์';
}

// ============================================================
// RENDER STUDENT LIST
// ============================================================
function renderList() {
  const dept = document.getElementById('filter-dept').value;
  const list = document.getElementById('student-list');

  const filtered = allStudents.filter(s => matchMode(s, currentMode) && matchDept(s.dept, dept));

  let checkedCnt = 0;
  filtered.forEach(s => {
    const done = checkedMap[s.phone] || [];
    const relevant = s.buttons.filter(b => btnMatchesMode(b, currentMode));
    if (relevant.length > 0 && relevant.every(b => done.includes(b))) checkedCnt++;
  });

  document.getElementById('cnt-show').textContent    = filtered.length;
  document.getElementById('cnt-checked').textContent = checkedCnt;
  document.getElementById('cnt-pending').textContent = filtered.length - checkedCnt;

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <p>ไม่มีนักเรียนที่ตรงกับตัวกรองที่เลือก</p>
      </div>`;
    return;
  }
  list.innerHTML = filtered.map(buildCard).join('');
}

// ============================================================
// BUILD STUDENT CARD
// ============================================================
function buildCard(s) {
  const letter = s.nickname ? s.nickname[0] : '?';
  const done   = checkedMap[s.phone] || [];

  const visibleBtns = s.buttons.filter(b => btnMatchesMode(b, currentMode));
  const allLocked   = visibleBtns.length > 0 && visibleBtns.every(b => done.includes(b));

  const btnHtml = visibleBtns.map(btn => {
    const locked = done.includes(btn);
    if (locked) {
      return `<button class="btn-check locked-btn" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        ${btn}
      </button>`;
    }
    const cls = btn==='ติวสด' ? 'tutor' : (btn==='วาดเส้น' ? 'draw' : 'online');
    const sid = encodeURIComponent(JSON.stringify(s));
    return `<button class="btn-check ${cls}" onclick="doCheckIn(this,'${sid}','${btn}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      ${btn}
    </button>`;
  }).join('');

  let warns = '';
  if (s.warnRemaining) warns += `<div class="warn-banner red">⚠️ ครั้งเรียนเหลือน้อย (${esc(s.remaining)} ครั้ง) — ควรต่ออายุ</div>`;
  if (s.warnExpire)    warns += `<div class="warn-banner">⏰ คอร์สใกล้หมดอายุ ${esc(s.expire)}</div>`;

  const deptTag   = s.dept   ? `<span class="tag dept">${esc(s.dept)}</span>` : '';
  const periodTag = s.period ? `<span class="tag period">รอบ ${esc(s.period)}</span>` : '';

  const remainMeta = s.remaining !== ''
    ? `<span class="meta-item${s.warnRemaining?' warn':''}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        เหลือ ${esc(s.remaining)} ครั้ง</span>` : '';

  const expireMeta = s.expire
    ? `<span class="meta-item${s.warnExpire?' warn':''}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        หมดอายุ: ${esc(s.expire)}</span>` : '';

  const courseMeta = `<span class="meta-item soft">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    ${esc(s.course)}</span>`;

  return `
  <div class="student-card${allLocked?' all-locked':''}">
    <div class="avatar">${esc(letter)}</div>
    <div class="card-body">
      <div class="name-row">
        <span class="s-nickname">${esc(s.nickname)}</span>
        <span class="s-fullname">${esc(s.fullname)}</span>
        ${deptTag}${periodTag}
      </div>
      <div class="meta-row">
        <span class="meta-item">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          ${esc(s.school)}</span>
        ${remainMeta}${expireMeta}${courseMeta}
      </div>
      ${warns}
    </div>
    <div class="card-actions">${btnHtml || '<span style="font-size:12px;color:var(--gray-400)">ไม่มีปุ่ม</span>'}</div>
  </div>`;
}

// ============================================================
// CHECK IN
// ============================================================
async function doCheckIn(btn, sid, mode) {
  let s = JSON.parse(decodeURIComponent(sid));
  btn.disabled = true; 
  showLoad(true);

  try {
    const res = await callGAS('saveAttendance', {
      dateStr: currentDate,
      nickname: s.nickname,
      school: s.school,
      phone: s.phone,
      dept: s.dept,
      period: s.period,
      mode: mode
    });
    
    if (res.success) {
      toast(`✅ เช็คชื่อ ${s.nickname} (${mode}) สำเร็จ`, 'ok');
      if (!checkedMap[s.phone]) checkedMap[s.phone] = [];
      checkedMap[s.phone].push(mode);
      
      // อัปเดต UI ฝั่ง Client ลดจำนวนลงชั่วคราวโดยไม่ต้องรอโหลดชีตใหม่ทั้งหมด
      if(s.remaining !== '' && !isNaN(s.remaining) && s.remaining > 0) {
         allStudents = allStudents.map(st => {
            if(st.phone === s.phone) {
               st.remaining = st.remaining - 1;
               if(st.remaining <= 2) st.warnRemaining = true;
            }
            return st;
         });
      }
      renderList();
    } else {
      throw new Error(res.error);
    }
  } catch(e) {
    toast('บันทึกไม่สำเร็จ: ' + e.message, 'err');
    btn.disabled = false;
  } finally {
    showLoad(false);
  }
}

// ============================================================
// REPORT PAGE
// ============================================================
async function loadReport() {
  const dateStr = document.getElementById('report-date').value;
  showLoad(true);
  try {
    const res = await callGAS('getAttendanceLog', dateStr);
    if (!res || !res.success) throw new Error(res ? res.error : 'โหลดไม่สำเร็จ');

    document.getElementById('r-total').textContent  = res.data.length;
    document.getElementById('r-tutor').textContent  = res.countTutor  || 0;
    document.getElementById('r-online').textContent = res.countOnline || 0;

    const tbody = document.getElementById('report-body');
    const empty = document.getElementById('report-empty');

    if (res.data.length === 0) {
      tbody.innerHTML      = '';
      empty.style.display  = '';
      return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = res.data.map(r => {
      const mc = r.mode==='ติวสด' ? 'tutor' : (r.mode==='วาดเส้น' ? 'draw' : 'online');
      return `<tr>
        <td>${r.no}</td>
        <td><strong>${esc(r.nickname)}</strong></td>
        <td>${esc(r.school)}</td>
        <td>${esc(r.dept)}</td>
        <td><span class="mode-badge ${mc}">${esc(r.mode)}</span></td>
      </tr>`;
    }).join('');
  } catch(e) {
    toast('โหลดรายงานไม่สำเร็จ: '+e.message,'err');
  } finally {
    showLoad(false);
  }
}

// ============================================================
// UTILITIES
// ============================================================
function showLoad(v) { document.getElementById('loading').style.display = v ? '' : 'none'; }

function toast(msg, type='ok') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3800);
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
