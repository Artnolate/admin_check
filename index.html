<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อสำหรับแอดมิน</title>
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --bg: #f3f4f6; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); }
        .role-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; border: 2px solid #ccc; }
        .btn-live { background: #fee2e2; color: #dc2626; border-color: #ef4444; }
        .btn-online { background: #dbeafe; color: #2563eb; border-color: #3b82f6; }
        .btn-live.active { background: #ef4444; color: white; }
        .btn-online.active { background: #3b82f6; color: white; }
        .search-box { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-bottom: 20px; }
        .student-card { border: 1px solid #e5e7eb; padding: 15px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .student-info p { margin: 4px 0; }
        .badge { background: #e0e7ff; color: #4338ca; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .checkin-btn { background: var(--success); color: white; padding: 10px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .loading { text-align: center; font-style: italic; color: #666; display: none; margin: 20px 0; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 ระบบบันทึกการเข้าเรียน (แอดมิน)</h2>
    
    <div class="role-selector">
        <button class="btn btn-live" onclick="setRole('live')">แอดมินฝั่ง [ ติวสด ]</button>
        <button class="btn btn-online" onclick="setRole('online')">แอดมินฝั่ง [ ออนไลน์ ]</button>
    </div>

    <input type="text" id="search" class="search-box" placeholder="พิมพ์ชื่อเล่น หรือ เบอร์โทร เพื่อค้นหา..." oninput="renderStudents()">
    <div id="loading" class="loading">⏳ กำลังดึงข้อมูลจาก Google Sheets...</div>
    <div id="student-list"></div>
</div>

<div id="checkinModal" class="modal">
    <div class="modal-content">
        <h3 id="modalStudentName">เช็คชื่อเข้าเรียน</h3>
        <label>📚 วิชาที่เรียน:</label>
        <input type="text" id="modalSubject" placeholder="เช่น วาดเส้น, วัตถุ, แฟชั่น">
        <div class="modal-btns">
            <button class="btn" style="background:#f3f4f6; color:#333;" onclick="closeModal()">ยกเลิก</button>
            <button class="btn" style="background:var(--success); color:white;" onclick="submitCheckIn()">ยืนยันบันทึก</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ วางลิงก์ Web App (ที่ลงท้ายด้วย /exec) ของคุณในเครื่องหมายคำพูดด้านล่างนี้ครับ!
    const API_URL = "https://script.google.com/macros/s/AKfycbwKyL3QkORniX3bT2693NYdX1lYOdWCILgM8sv2_MmJYMuZMhh7f_o3xcD1BQomLm2A/exec"; 
    
    let allStudents = [];
    let currentRole = '';
    let selectedStudent = null;

    function setRole(role) {
        currentRole = role;
        document.querySelector('.btn-live').classList.toggle('active', role === 'live');
        document.querySelector('.btn-online').classList.toggle('active', role === 'online');
        fetchStudents();
    }

    async function fetchStudents() {
        if (!currentRole) return;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('student-list').innerHTML = '';
        try {
            const response = await fetch(`${API_URL}?action=getStudents`);
            const result = await response.json();
            if (result.status === "success") {
                allStudents = result.data.filter(s => s.status === "Active");
                renderStudents();
            }
        } catch (error) {
            alert("ดึงข้อมูลไม่สำเร็จ กรุณาเช็คสิทธิ์ใน Apps Script ว่าเป็น Anyone หรือยัง");
        }
        document.getElementById('loading').style.display = 'none';
    }

    function renderStudents() {
        const searchKeyword = document.getElementById('search').value.toLowerCase().trim();
        const container = document.getElementById('student-list');
        container.innerHTML = '';

        const filtered = allStudents.filter(s => {
            const matchSearch = s.nickname.toLowerCase().includes(searchKeyword) || s.phone.includes(searchKeyword);
            const courseName = s.course.toLowerCase();
            if (currentRole === 'live') { return matchSearch && (courseName.includes('ติวสด') || courseName.includes('mix')); }
            if (currentRole === 'online') { return matchSearch && (courseName.includes('ออนไลน์') || courseName.includes('mix')); }
            return false;
        });

        if(filtered.length === 0 && currentRole !== '') {
            container.innerHTML = '<p style="text-align:center; color:#999;">ไม่พบข้อมูลรายชื่อนักเรียนในหมวดนี้</p>';
            return;
        }

        filtered.forEach(s => {
            const remainText = s.course.includes('Buffet') ? 'คอร์สเหมา ไม่จำกัดครั้ง' : `เหลือ: ${s.remaining} ครั้ง`;
            const card = document.createElement('div');
            card.className = 'student-card';
            card.innerHTML = `
                <div class="student-info">
                    <p><b>น้อง ${s.nickname}</b> <span class="badge">รอบที่ ${s.currentRound}</span></p>
                    <p style="font-size:14px; color:#666;">📞 ${s.phone} | 📦 ${s.course}</p>
                    <p style="font-size:14px; color: var(--primary);">⏱️ ${remainText} | 📅 หมดอายุ: ${s.expireDate || '-'}</p>
                </div>
                <button class="checkin-btn" onclick="openCheckInModal('${s.phone}', '${s.nickname}')">เช็คชื่อ</button>
            `;
            container.appendChild(card);
        });
    }

    function openCheckInModal(phone, nickname) {
        selectedStudent = allStudents.find(s => s.phone === phone);
        document.getElementById('modalStudentName').innerText = `เช็คชื่อ: น้อง ${nickname}`;
        document.getElementById('modalSubject').value = '';
        document.getElementById('checkinModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('checkinModal').style.display = 'none'; }

    async function submitCheckIn() {
        const subject = document.getElementById('modalSubject').value.trim();
        if (!subject) return alert("กรุณาระบุวิชาก่อนครับ");
        const classType = currentRole === 'live' ? 'ติวสด' : 'ออนไลน์';
        closeModal();
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "checkIn", phone: selectedStudent.phone, subject: subject, classType: classType })
            });
            const result = await response.json();
            if (result.status === "success") { alert("บันทึกสำเร็จ!"); fetchStudents(); }
        } catch (error) { alert("บันทึกล้มเหลว"); }
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
