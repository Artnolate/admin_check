<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบเช็คชื่อ — ARTNOLATE</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* คงเดิมทั้งหมด */
:root{--bg:#F7F8FA; --surface:#fff; --border:#E4E7ED; --txt:#1A1D23; --txt2:#6B7280; --accent:#3D5AFE; --accent-l:#EEF1FF; --green:#10B981; --r:10px; --rs:6px; --sh:0 1px 3px rgba(0,0,0,.07);}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--txt);margin:0}
.hdr{background:var(--surface);padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.tabs{background:var(--surface);display:flex;border-bottom:1px solid var(--border)}
.tab{padding:12px 20px;border:none;background:none;cursor:pointer;font-weight:600;color:var(--txt2)}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.page{display:none;padding:20px;max-width:980px;margin:auto}
.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;display:flex;justify-content:between;align-items:center}
.card.done{opacity:.6;background:var(--bg)}
.cbtn{padding:8px 15px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);cursor:pointer;font-weight:600}
.cbtn.done{background:var(--green);border-color:var(--green);color:#fff;pointer-events:none}
.rtable{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--r)}
.rtable th,.rtable td{padding:12px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<header class="hdr"><div><strong>📋 ระบบเช็คชื่อ</strong><br><small style="color:var(--accent)">ARTNOLATE</small></div><div id="sync-label">พร้อมใช้งาน</div></header>

<nav class="tabs">
  <button class="tab active" onclick="goTab('attendance',this)">✅ เช็คชื่อ</button>
  <button class="tab" onclick="goTab('report',this)">📊 รายงาน</button>
</nav>

<div class="page active" id="page-attendance">
  <div style="margin-bottom:15px">
    <input type="date" id="att-date" onchange="renderAttendance()">
    <select id="att-dept" onchange="renderAttendance()">
      <option value="">— เลือกภาควิชา —</option>
      <option>ศิลปกรรม</option><option>สถาปัตยกรรม</option><option>นิเทศศิลป์</option>
    </select>
  </div>
  <div id="att-list"></div>
</div>

<div class="page" id="page-report">
  <input type="date" id="rep-date" onchange="renderReport()">
  <div id="rep-content" style="margin-top:15px"></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyftmXqCv2YbMtPLyHR1ANdJaZ4zTCyNDDrY5shpg_AvwM_ZY7diIM__-a1m7a0xNig/exec';
let students = [];

window.onload = async () => {
  const d = new Date().toISOString().slice(0,10);
  document.getElementById('att-date').value = d;
  document.getElementById('rep-date').value = d;
  const res = await fetch(`${GAS_URL}?action=getStudents`);
  const data = await res.json();
  students = data.students || [];
  renderAttendance();
};

async function renderAttendance() {
  const date = document.getElementById('att-date').value;
  const dept = document.getElementById('att-dept').value;
  if (!dept) return;

  // ดึง Log สดๆ จาก Sheet ทุกครั้ง เพื่อเช็คสถานะปุ่ม
  const res = await fetch(`${GAS_URL}?action=getLog&date=${date}`);
  const data = await res.json();
  const logs = data.rows || [];

  const list = students.filter(s => s.dept === dept);
  const html = list.map(s => {
    // เช็คว่ามีในชีตหรือไม่โดยเทียบโทรศัพท์และรูปแบบ (ใช้ normPhone ช่วย)
    const hasChecked = logs.some(l => normPhone(l.phone) === normPhone(s.phone));
    return `
      <div class="card ${hasChecked ? 'done' : ''}">
        <div><strong>${s.nickname}</strong><br><small>${s.school}</small></div>
        <button class="cbtn ${hasChecked ? 'done' : ''}" 
          onclick="doCheck(this, '${s.phone}', '${s.nickname}', '${s.school}', '${s.dept}', '${date}')">
          ${hasChecked ? 'เช็คแล้ว ✓' : 'กดเช็คชื่อ'}
        </button>
      </div>`;
  }).join('');
  document.getElementById('att-list').innerHTML = html;
}

async function doCheck(btn, phone, nickname, school, dept, date) {
  btn.textContent = '⏳...';
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addLog', date, phone, nickname, school, dept, round:'-', type:'ติวสด' })
    });
    const result = await res.json();
    if (result.success) {
      btn.className = 'cbtn done';
      btn.textContent = 'เช็คแล้ว ✓';
    } else {
      alert('บันทึกไม่ได้: ' + (result.error || ''));
      btn.textContent = 'กดเช็คชื่อ';
    }
  } catch(e) { alert('การเชื่อมต่อล้มเหลว'); btn.textContent = 'กดเช็คชื่อ'; }
}

function normPhone(p) { return String(p).replace(/[^0-9]/g, '').replace(/^0+/, ''); }

async function renderReport() {
  const date = document.getElementById('rep-date').value;
  const res = await fetch(`${GAS_URL}?action=getLog&date=${date}`);
  const data = await res.json();
  const rows = data.rows || [];
  document.getElementById('rep-content').innerHTML = `
    <table class="rtable">
      <tr><th>ชื่อ</th><th>โรงเรียน</th><th>เบอร์โทร</th></tr>
      ${rows.map(r => `<tr><td>${r.nickname}</td><td>${r.school}</td><td>${r.phone}</td></tr>`).join('')}
    </table>`;
}

function goTab(t, el) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  if(t === 'report') renderReport();
}
</script>
</body>
</html>
